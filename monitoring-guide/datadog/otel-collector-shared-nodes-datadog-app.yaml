apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: otel-collector-shared-nodes-datadog
spec:
  access:
  - users:
    - '*'
    verbs:
    - get
  config:
    chart:
      name: opentelemetry-kube-stack
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      version: 0.14.4
    values: | # yaml
      ---
      clusterName: "{{ .Values.loft.cluster }}"
      crds:
        installPrometheus: false
      opentelemetry-operator:
        enabled: true
        manager:
          collectorImage:
            repository: otel/opentelemetry-collector-contrib
          featureGatesMap:
            operator.targetallocator.mtls: true
        admissionWebhooks:
          certManager:
            enabled: false
          autoGenerateCert:
            enabled: true
            recreate: true
      # Post-install job removes DELETE validation webhooks that block app uninstallation (operator bug).
      # The operator incorrectly denies DELETE operations on collector CRs in deployment+TA mode,
      # which causes the chart's pre-delete cleanup job to fail and hang termination.
      extraObjects:
      - apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: patch-webhook-sa
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "1"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: otel-collector-shared-nodes-datadog-patch-webhook
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "1"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        rules:
        - apiGroups: ["admissionregistration.k8s.io"]
          resources: ["validatingwebhookconfigurations"]
          verbs: ["get", "patch"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: otel-collector-shared-nodes-datadog-patch-webhook
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "1"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        subjects:
        - kind: ServiceAccount
          name: patch-webhook-sa
          namespace: otel
        roleRef:
          kind: ClusterRole
          name: otel-collector-shared-nodes-datadog-patch-webhook
          apiGroup: rbac.authorization.k8s.io
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: patch-webhook
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "10"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        spec:
          template:
            spec:
              restartPolicy: Never
              serviceAccountName: patch-webhook-sa
              containers:
              - name: patch
                image: "bitnami/kubectl:latest"
                command: ["bash", "-c"]
                args:
                - |
                  WH="otel-collector-shared-nodes-datadog-opentelemetry-operator-validation"
                  for i in $(seq 1 30); do kubectl get validatingwebhookconfiguration "$WH" >/dev/null 2>&1 && break; sleep 2; done
                  # Build JSON patch to remove webhooks with "delete" in name (reverse order to preserve indices)
                  PATCH=$(kubectl get validatingwebhookconfiguration "$WH" -o jsonpath='{range .webhooks[*]}{.name}{"\n"}{end}' \
                    | awk '/delete/{print NR-1}' | sort -rn \
                    | awk 'BEGIN{printf "["} NR>1{printf ","} {printf "{\"op\":\"remove\",\"path\":\"/webhooks/%d\"}",$1} END{printf "]"}')
                  [ "$PATCH" = "[]" ] && exit 0
                  echo "Removing DELETE webhooks: $PATCH"
                  kubectl patch validatingwebhookconfiguration "$WH" --type=json -p="$PATCH"
      collectors:
        # Disable the default DaemonSet collector
        daemon:
          enabled: false
        # Deployment-mode collector with Target Allocator
        cluster:
          enabled: true
          suffix: cluster
          mode: deployment
          replicas: 2
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          presets:
            kubernetesAttributes:
              enabled: true
          env:
            - name: DD_API_KEY
              value: "{{ .Values.datadog.apiKey }}"
          targetAllocator:
            enabled: true
            allocationStrategy: consistent-hashing
            prometheusCR:
              enabled: true
              serviceMonitorSelector:
                matchLabels:
                  app: vcluster
              podMonitorSelector: {}
          config:
            receivers:
              prometheus:
                config:
                  scrape_configs:
                    - job_name: 'kubelet-cadvisor'
                      scrape_interval: 60s
                      kubernetes_sd_configs:
                        - role: node
                      scheme: https
                      tls_config:
                        insecure_skip_verify: true
                      authorization:
                        credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                      metrics_path: /metrics/cadvisor
                      relabel_configs:
                        - source_labels: [__meta_kubernetes_node_address_InternalIP]
                          target_label: __address__
                          replacement: '$$1:10250'
                        - action: labelmap
                          regex: __meta_kubernetes_node_label_(.+)
                        - source_labels: [__meta_kubernetes_node_name]
                          target_label: node
                    # Collector self-telemetry (powers Datadog's OTel Collector OOTB dashboard)
                    - job_name: 'otelcol-self'
                      scrape_interval: 30s
                      static_configs:
                        - targets: ['0.0.0.0:8888']
            processors:
              groupbyattrs:
                keys:
                - namespace
                - pod
                - node
              transform/pre_enrich:
                error_mode: ignore
                metric_statements:
                - context: resource
                  statements:
                  - 'set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil'
                  - 'set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil'
                  - 'set(attributes["k8s.node.name"], attributes["node"]) where attributes["node"] != nil'
              k8sattributes:
                auth_type: serviceAccount
                passthrough: false
                extract:
                  metadata:
                  - k8s.namespace.name
                  - k8s.pod.name
                  - k8s.pod.start_time
                  - k8s.pod.uid
                  - k8s.deployment.name
                  - k8s.node.name
                  - k8s.container.name
                  labels:
                  # Pod labels - vcluster syncer adds these to synced pods
                  - tag_name: vcluster_virtual_namespace
                    key: vcluster.loft.sh/namespace
                    from: pod
                  # Namespace labels - platform adds these to vcluster namespaces
                  - tag_name: vcluster_project
                    key: loft.sh/project
                    from: namespace
                  - tag_name: vcluster_project_namespace
                    key: loft.sh/vcluster-instance-namespace
                    from: namespace
                  - tag_name: vcluster_user
                    key: loft.sh/user
                    from: namespace
                  - tag_name: vcluster_name
                    key: loft.sh/vcluster-instance-name
                    from: namespace
                  annotations:
                  # Pod annotations - identifies the virtual pod name
                  - tag_name: vcluster_virtual_pod
                    key: vcluster.loft.sh/name
                    from: pod
              filter/vcluster_only:
                metrics:
                  datapoint:
                  - 'resource.attributes["vcluster_name"] == nil and not IsMatch(metric.name, "^otelcol_")'
              # Set k8s.cluster.name (becomes kube_cluster_name tag in Datadog) and the
              # vcluster-specific cluster label. Without k8s.cluster.name, Datadog's
              # OOTB Kubernetes dashboards do not populate.
              resource/add_cluster:
                attributes:
                - action: upsert
                  key: cluster
                  value: "{{ .Values.loft.cluster }}"
                - action: upsert
                  key: k8s.cluster.name
                  value: "{{ .Values.loft.cluster }}"
              # Pin datadog.host.name per-payload:
              # - workload metrics (cadvisor) -> the node the pod runs on
              # - control-plane metrics (ServiceMonitor) -> a synthetic per-cluster host
              # Without this, each collector replica registers as its own ephemeral host
              # in Datadog's infra list ("every collector pod becomes a host").
              transform/set_host:
                error_mode: ignore
                metric_statements:
                - context: resource
                  statements:
                  - 'set(attributes["datadog.host.name"], attributes["k8s.node.name"]) where attributes["k8s.node.name"] != nil'
                  - 'set(attributes["datadog.host.name"], "{{ .Values.loft.cluster }}-vcluster-cp") where attributes["k8s.node.name"] == nil'
              transform:
                error_mode: ignore
                metric_statements:
                - context: datapoint
                  statements:
                  - 'set(attributes["k8s.node.name"], resource.attributes["k8s.node.name"])'
                  - 'set(attributes["k8s.pod.name"], resource.attributes["k8s.pod.name"])'
                  - 'set(attributes["k8s.namespace.name"], resource.attributes["k8s.namespace.name"])'
                  - 'set(attributes["vcluster_virtual_pod"], resource.attributes["vcluster_virtual_pod"])'
                  - 'set(attributes["vcluster_virtual_namespace"], resource.attributes["vcluster_virtual_namespace"])'
                  - 'set(attributes["vcluster_project"], resource.attributes["vcluster_project"])'
                  - 'set(attributes["vcluster_project_namespace"], resource.attributes["vcluster_project_namespace"])'
                  - 'set(attributes["vcluster_user"], resource.attributes["vcluster_user"])'
                  - 'set(attributes["vcluster_name"], resource.attributes["vcluster_name"])'
              # Cardinality guard: drop high-cardinality labels and cap resource attributes
              # to the set we actually query. Datadog bills per (metric name x unique tagset),
              # so unfiltered cadvisor/kubelet/apiserver series blow up custom-metrics cost.
              transform/cardinality_guard:
                error_mode: ignore
                metric_statements:
                - context: datapoint
                  statements:
                  - 'delete_matching_keys(attributes, "^(id|image|name|kernelVersion|osVersion|interface|boot_id|machine_id|system_uuid)$")'
                - context: resource
                  statements:
                  - 'keep_keys(attributes, ["k8s.cluster.name","k8s.namespace.name","k8s.deployment.name","k8s.pod.name","k8s.node.name","k8s.container.name","container.image.tag","vcluster_name","vcluster_project","vcluster_project_namespace","vcluster_user","vcluster_virtual_namespace","vcluster_virtual_pod","cluster","datadog.host.name","host.name","cloud.region","cloud.provider"])'
              memory_limiter:
                check_interval: 1s
                limit_percentage: 75
                spike_limit_percentage: 15
              batch:
                send_batch_size: 10000
                send_batch_max_size: 10000
                timeout: 10s
            exporters:
              datadog:
                api:
                  key: ${env:DD_API_KEY}
                  site: "{{ .Values.datadog.site }}"
                host_metadata:
                  enabled: true
                  hostname_source: config_or_system
                metrics:
                  histograms:
                    mode: distributions
                    send_aggregation_metrics: true
                  sums:
                    cumulative_monotonic_mode: to_delta
                  summaries:
                    mode: gauges
            extensions:
              health_check:
                endpoint: 0.0.0.0:13133
            service:
              extensions:
              - health_check
              pipelines:
                metrics:
                  receivers:
                  - prometheus
                  processors:
                  - memory_limiter
                  - groupbyattrs
                  - transform/pre_enrich
                  - k8sattributes
                  - filter/vcluster_only
                  - resource/add_cluster
                  - transform/set_host
                  - transform
                  - transform/cardinality_guard
                  - batch
                  exporters:
                  - datadog
  defaultNamespace: monitoring
  description: |
    OpenTelemetry Kube Stack for shared node vCluster monitoring with Datadog.

    Deploys a Deployment-mode OTel Collector (2 replicas) with Target Allocator
    using consistent-hashing to distribute scrape targets across replicas.

    Workload metrics: Scrapes cAdvisor /metrics/cadvisor via the Prometheus receiver
    with kubernetes_sd_configs (node role). Uses standard Prometheus metric names
    (container_cpu_usage_seconds_total, etc.). Non-vcluster metrics are filtered out
    after enrichment via the filter/vcluster_only processor.

    Control plane metrics: Target Allocator discovers vcluster ServiceMonitors
    (filtered by app=vcluster label) and scrapes API server and controller-manager
    metrics with per-vcluster mTLS handled automatically.

    Collector self-telemetry: Scrapes 0.0.0.0:8888 to drive Datadog's OOTB
    OpenTelemetry Collector dashboard.

    All metrics are enriched with vcluster identity labels at ingest time via
    groupbyattrs + k8sattributes processors. The cluster and k8s.cluster.name
    attributes are set from {{ .Values.loft.cluster }}; k8s.cluster.name becomes
    the kube_cluster_name tag that Datadog's OOTB Kubernetes dashboards group by.

    The transform/set_host processor pins datadog.host.name per-payload so collector
    replicas do not register as ephemeral hosts in Datadog's infrastructure list.

    The transform/cardinality_guard processor drops high-cardinality labels and
    restricts resource attributes to the set used by queries, capping custom-metrics
    billing cost. Combine with Metrics without Limits (Datadog UI) for further control.

    Metrics are exported to Datadog via the OTel Datadog exporter with histograms
    pinned to distributions mode (required for server-side percentile queries).

    Prerequisites:
    - Datadog account with API key
    - Kubelet scraping disabled in existing kube-prometheus-stack (kubelet.enabled: false)
    - vClusters must have controlPlane.serviceMonitor.enabled: true
    - Prometheus Operator CRDs must be installed (ServiceMonitor, PodMonitor)
    - Platform namespace labels (loft.sh/project, etc.) must exist

    Deploy once per host cluster.
  displayName: OTEL Collector - Shared Nodes (Datadog)
  icon: https://opentelemetry.io/img/logos/opentelemetry-logo-nav.png
  parameters:
  - description: Your Datadog API key
    label: Datadog API Key
    required: true
    type: password
    variable: datadog.apiKey
  - defaultValue: datadoghq.com
    description: 'Datadog site (e.g. datadoghq.com, datadoghq.eu, us5.datadoghq.com)'
    label: Datadog Site
    variable: datadog.site
  recommendedApp:
  - cluster
