apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: otel-collector-private-nodes-datadog
spec:
  access:
  - users:
    - '*'
    verbs:
    - get
  config:
    chart:
      name: opentelemetry-collector
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      version: 0.144.0
    values: | # yaml
      ---
      mode: daemonset
      image:
        repository: otel/opentelemetry-collector-contrib
      presets:
        kubeletMetrics:
          enabled: false
        kubernetesAttributes:
          enabled: true
      service:
        enabled: true
      # Explicitly inject node name for local-only scraping and hostname pinning
      extraEnvs:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DD_API_KEY
          value: "{{ .Values.datadog.apiKey }}"
      clusterRole:
        rules:
        - apiGroups: [""]
          resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["apps"]
          resources: ["replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["extensions"]
          resources: ["replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["nodes/stats"]
          verbs: ["get", "list", "watch"]
        - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
          verbs: ["get"]
      config:
        receivers:
          prometheus:
            config:
              scrape_configs:
                - job_name: 'kubelet'
                  scrape_interval: 60s
                  kubernetes_sd_configs:
                    - role: node
                  scheme: https
                  tls_config:
                    insecure_skip_verify: {{ .Values.scrape.insecure }}
                  authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  relabel_configs:
                    # Only scrape the node this pod is running on
                    - source_labels: [__meta_kubernetes_node_name]
                      regex: '${env:K8S_NODE_NAME}'
                      action: keep
                    - source_labels: [__meta_kubernetes_node_address_InternalIP]
                      target_label: __address__
                      replacement: '$$1:10250'
                    - action: labelmap
                      regex: __meta_kubernetes_node_label_(.+)
                    - source_labels: [__meta_kubernetes_node_name]
                      target_label: node
                  metric_relabel_configs:
                    - source_labels: [namespace]
                      target_label: vcluster_virtual_namespace
                    - source_labels: [pod]
                      target_label: vcluster_virtual_pod

                - job_name: 'kubelet-cadvisor'
                  scrape_interval: 60s
                  kubernetes_sd_configs:
                    - role: node
                  scheme: https
                  tls_config:
                    insecure_skip_verify: {{ .Values.scrape.insecure }}
                  authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  metrics_path: /metrics/cadvisor
                  relabel_configs:
                    # Only scrape the node this pod is running on
                    - source_labels: [__meta_kubernetes_node_name]
                      regex: '${env:K8S_NODE_NAME}'
                      action: keep
                    - source_labels: [__meta_kubernetes_node_address_InternalIP]
                      target_label: __address__
                      replacement: '$$1:10250'
                    - action: labelmap
                      regex: __meta_kubernetes_node_label_(.+)
                    - source_labels: [__meta_kubernetes_node_name]
                      target_label: node
                  metric_relabel_configs:
                    - source_labels: [namespace]
                      target_label: vcluster_virtual_namespace
                    - source_labels: [pod]
                      target_label: vcluster_virtual_pod

                - job_name: 'apiserver'
                  scrape_interval: 60s
                  kubernetes_sd_configs:
                    - role: endpoints
                      namespaces:
                        names: ['default']
                  scheme: https
                  tls_config:
                    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecure_skip_verify: {{ .Values.scrape.insecure }}
                  authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  relabel_configs:
                    - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                      action: keep
                      regex: kubernetes;https

                # Collector self-telemetry (powers Datadog's OTel Collector OOTB dashboard)
                - job_name: 'otelcol-self'
                  scrape_interval: 30s
                  static_configs:
                    - targets: ['0.0.0.0:8888']
        processors:
          k8sattributes:
            auth_type: 'serviceAccount'
            extract:
              metadata:
              - k8s.namespace.name
              - k8s.pod.name
              - k8s.pod.start_time
              - k8s.pod.uid
              - k8s.deployment.name
              - k8s.node.name
          # Detect node identity from the downward-API env vars. Populates host.name
          # from K8S_NODE_NAME so the datadog exporter has a stable node hostname
          # rather than the collector pod's own hostname.
          resourcedetection:
            detectors: [env, system]
            timeout: 2s
            override: false
          # Vcluster identity + k8s.cluster.name (becomes kube_cluster_name tag in
          # Datadog). Without k8s.cluster.name, Datadog's OOTB Kubernetes dashboards
          # do not populate.
          resource/identity:
            attributes:
            - action: upsert
              key: cluster
              value: "{{ .Values.loft.cluster }}"
            - action: upsert
              key: k8s.cluster.name
              value: "{{ .Values.loft.cluster }}"
            - action: upsert
              key: vcluster_name
              value: "{{ .Values.loft.name }}"
            - action: upsert
              key: vcluster_project
              value: "{{ .Values.loft.project }}"
            - action: upsert
              key: vcluster_project_namespace
              value: "{{ .Values.loft.space }}"
            - action: upsert
              key: vcluster_user
              value: "{{ .Values.loft.user.name }}"
          # Pin datadog.host.name to the underlying k8s node. A DaemonSet puts one
          # collector pod per node, so this maps 1:1. Without this, the pod's own
          # hostname is used, causing collector restarts to churn the Datadog infra
          # host list.
          transform/set_host:
            error_mode: ignore
            metric_statements:
            - context: resource
              statements:
              - 'set(attributes["datadog.host.name"], "${env:K8S_NODE_NAME}")'
          transform:
            error_mode: ignore
            metric_statements:
            - context: datapoint
              statements:
              - 'set(attributes["k8s.node.name"], resource.attributes["k8s.node.name"])'
              - 'set(attributes["k8s.pod.name"], resource.attributes["k8s.pod.name"])'
              - 'set(attributes["k8s.namespace.name"], resource.attributes["k8s.namespace.name"])'
              - 'set(attributes["cluster"], resource.attributes["cluster"])'
              - 'set(attributes["vcluster_name"], resource.attributes["vcluster_name"])'
              - 'set(attributes["vcluster_project"], resource.attributes["vcluster_project"])'
              - 'set(attributes["vcluster_project_namespace"], resource.attributes["vcluster_project_namespace"])'
              - 'set(attributes["vcluster_user"], resource.attributes["vcluster_user"])'
          # Cardinality guard: drop high-cardinality labels and cap resource attributes
          # to the set we actually query. Datadog bills per (metric name x unique tagset),
          # so unfiltered cadvisor/kubelet/apiserver series blow up custom-metrics cost.
          transform/cardinality_guard:
            error_mode: ignore
            metric_statements:
            - context: datapoint
              statements:
              - 'delete_matching_keys(attributes, "^(id|image|name|kernelVersion|osVersion|interface|boot_id|machine_id|system_uuid)$")'
            - context: resource
              statements:
              - 'keep_keys(attributes, ["k8s.cluster.name","k8s.namespace.name","k8s.deployment.name","k8s.pod.name","k8s.node.name","k8s.container.name","container.image.tag","vcluster_name","vcluster_project","vcluster_project_namespace","vcluster_user","vcluster_virtual_namespace","vcluster_virtual_pod","cluster","datadog.host.name","host.name","cloud.region","cloud.provider"])'
          memory_limiter:
            check_interval: 1s
            limit_percentage: 75
            spike_limit_percentage: 15
          batch:
            send_batch_size: 10000
            timeout: 10s
        exporters:
          datadog:
            api:
              key: ${env:DD_API_KEY}
              site: "{{ .Values.datadog.site }}"
            host_metadata:
              enabled: true
              hostname_source: config_or_system
            metrics:
              histograms:
                mode: distributions
                send_aggregation_metrics: true
              sums:
                cumulative_monotonic_mode: to_delta
              summaries:
                mode: gauges
        service:
          extensions:
          - health_check
          pipelines:
            metrics:
              receivers:
              - prometheus
              processors:
              - memory_limiter
              - k8sattributes
              - resourcedetection
              - resource/identity
              - transform/set_host
              - transform
              - transform/cardinality_guard
              - batch
              exporters:
              - datadog
  defaultNamespace: monitoring
  description: |
    OpenTelemetry Collector for private/dedicated node vCluster monitoring with Datadog.

    Deploys a DaemonSet-mode collector inside the vCluster, scraping kubelet /metrics,
    cAdvisor /metrics/cadvisor, and API server /metrics endpoints from each node.

    All metrics are enriched with vcluster identity labels (cluster, k8s.cluster.name,
    vcluster_name, vcluster_project, vcluster_user) via resource processors using
    Platform-injected {{ .Values.loft.* }} variables. Virtual namespace/pod labels
    are added via metric_relabel_configs at scrape time for dashboard compatibility
    with the shared-nodes collector.

    k8s.cluster.name becomes the kube_cluster_name tag that Datadog's OOTB Kubernetes
    dashboards group by. datadog.host.name is pinned to K8S_NODE_NAME so the DaemonSet
    pod does not register as an ephemeral host under its own pod hostname.

    Collector self-telemetry scrapes 0.0.0.0:8888 to drive Datadog's OOTB OpenTelemetry
    Collector dashboard.

    The transform/cardinality_guard processor drops high-cardinality labels and
    restricts resource attributes to the set used by queries, capping custom-metrics
    billing cost. Combine with Metrics without Limits (Datadog UI) for further control.

    Histogram mode is pinned to distributions so server-side percentile queries
    (p95, p99) work against apiserver_request_duration_seconds etc.

    Prerequisites:
    - Datadog account with API key
    - vCluster with dedicated/private nodes

    Deploy into each private-nodes vCluster.
  displayName: OTEL Collector - Private Nodes (Datadog)
  icon: https://opentelemetry.io/img/logos/opentelemetry-logo-nav.png
  parameters:
  - description: Your Datadog API key
    label: Datadog API Key
    required: true
    type: password
    variable: datadog.apiKey
  - defaultValue: datadoghq.com
    description: 'Datadog site (e.g. datadoghq.com, datadoghq.eu, us5.datadoghq.com)'
    label: Datadog Site
    variable: datadog.site
  - description: Skip TLS verification when scraping kubelet endpoints
    label: Skip Kubelet TLS Verification
    type: boolean
    variable: scrape.insecure
  recommendedApp:
  - virtualcluster
