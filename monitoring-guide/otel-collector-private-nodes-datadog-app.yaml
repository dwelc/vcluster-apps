apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: otel-collector-private-nodes-datadog
spec:
  access:
  - users:
    - '*'
    verbs:
    - get
  config:
    chart:
      name: opentelemetry-collector
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      version: 0.144.0
    values: | # yaml
      ---
      mode: daemonset
      image:
        repository: otel/opentelemetry-collector-contrib
      presets:
        kubeletMetrics:
          enabled: false
        kubernetesAttributes:
          enabled: true
      service:
        enabled: true
      # Explicitly inject node name for local-only scraping
      extraEnvs:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: DD_API_KEY
          value: "{{ .Values.datadog.apiKey }}"
      clusterRole:
        rules:
        - apiGroups: [""]
          resources: ["nodes", "nodes/metrics", "nodes/proxy", "services", "endpoints", "pods", "namespaces"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["apps"]
          resources: ["replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["extensions"]
          resources: ["replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["nodes/stats"]
          verbs: ["get", "list", "watch"]
        - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
          verbs: ["get"]
      config:
        receivers:
          prometheus:
            config:
              scrape_configs:
                - job_name: 'kubelet'
                  scrape_interval: 60s
                  kubernetes_sd_configs:
                    - role: node
                  scheme: https
                  tls_config:
                    insecure_skip_verify: {{ .Values.scrape.insecure }}
                  authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  relabel_configs:
                    # Only scrape the node this pod is running on
                    - source_labels: [__meta_kubernetes_node_name]
                      regex: '${env:K8S_NODE_NAME}'
                      action: keep
                    - source_labels: [__meta_kubernetes_node_address_InternalIP]
                      target_label: __address__
                      replacement: '$$1:10250'
                    - action: labelmap
                      regex: __meta_kubernetes_node_label_(.+)
                    - source_labels: [__meta_kubernetes_node_name]
                      target_label: node
                  metric_relabel_configs:
                    - source_labels: [namespace]
                      target_label: vcluster_virtual_namespace
                    - source_labels: [pod]
                      target_label: vcluster_virtual_pod

                - job_name: 'kubelet-cadvisor'
                  scrape_interval: 60s
                  kubernetes_sd_configs:
                    - role: node
                  scheme: https
                  tls_config:
                    insecure_skip_verify: {{ .Values.scrape.insecure }}
                  authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  metrics_path: /metrics/cadvisor
                  relabel_configs:
                    # Only scrape the node this pod is running on
                    - source_labels: [__meta_kubernetes_node_name]
                      regex: '${env:K8S_NODE_NAME}'
                      action: keep
                    - source_labels: [__meta_kubernetes_node_address_InternalIP]
                      target_label: __address__
                      replacement: '$$1:10250'
                    - action: labelmap
                      regex: __meta_kubernetes_node_label_(.+)
                    - source_labels: [__meta_kubernetes_node_name]
                      target_label: node
                  metric_relabel_configs:
                    - source_labels: [namespace]
                      target_label: vcluster_virtual_namespace
                    - source_labels: [pod]
                      target_label: vcluster_virtual_pod

                - job_name: 'apiserver'
                  scrape_interval: 60s
                  kubernetes_sd_configs:
                    - role: endpoints
                      namespaces:
                        names: ['default']
                  scheme: https
                  tls_config:
                    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                    insecure_skip_verify: {{ .Values.scrape.insecure }}
                  authorization:
                    credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                  relabel_configs:
                    - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                      action: keep
                      regex: kubernetes;https
        processors:
          k8sattributes:
            auth_type: 'serviceAccount'
            extract:
              metadata:
              - k8s.namespace.name
              - k8s.pod.name
              - k8s.pod.start_time
              - k8s.pod.uid
              - k8s.deployment.name
              - k8s.node.name
          # Add vcluster identity labels as resource attributes
          # (replaces external_labels which is PRW-specific)
          resource/identity:
            attributes:
            - action: upsert
              key: cluster
              value: "{{ .Values.loft.cluster }}"
            - action: upsert
              key: vcluster_name
              value: "{{ .Values.loft.name }}"
            - action: upsert
              key: vcluster_project
              value: "{{ .Values.loft.project }}"
            - action: upsert
              key: vcluster_project_namespace
              value: "{{ .Values.loft.space }}"
            - action: upsert
              key: vcluster_user
              value: "{{ .Values.loft.user.name }}"
          transform:
            error_mode: ignore
            metric_statements:
            - context: datapoint
              statements:
              - 'set(attributes["k8s.node.name"], resource.attributes["k8s.node.name"])'
              - 'set(attributes["k8s.pod.name"], resource.attributes["k8s.pod.name"])'
              - 'set(attributes["k8s.namespace.name"], resource.attributes["k8s.namespace.name"])'
              - 'set(attributes["cluster"], resource.attributes["cluster"])'
              - 'set(attributes["vcluster_name"], resource.attributes["vcluster_name"])'
              - 'set(attributes["vcluster_project"], resource.attributes["vcluster_project"])'
              - 'set(attributes["vcluster_project_namespace"], resource.attributes["vcluster_project_namespace"])'
              - 'set(attributes["vcluster_user"], resource.attributes["vcluster_user"])'
          memory_limiter:
            check_interval: 1s
            limit_percentage: 75
            spike_limit_percentage: 15
          batch:
            send_batch_size: 10000
            timeout: 10s
        exporters:
          datadog:
            api:
              key: ${env:DD_API_KEY}
              site: "{{ .Values.datadog.site }}"
        service:
          extensions:
          - health_check
          pipelines:
            metrics:
              receivers:
              - prometheus
              processors:
              - memory_limiter
              - k8sattributes
              - resource/identity
              - transform
              - batch
              exporters:
              - datadog
  defaultNamespace: monitoring
  description: |
    OpenTelemetry Collector for private/dedicated node vCluster monitoring with Datadog.

    Deploys a DaemonSet-mode collector inside the vCluster, scraping kubelet /metrics,
    cAdvisor /metrics/cadvisor, and API server /metrics endpoints from each node.

    All metrics are enriched with vcluster identity labels (cluster, vcluster_name,
    vcluster_project, vcluster_user) via resource processors using Platform-injected
    {{ .Values.loft.* }} variables. Virtual namespace/pod labels are added via
    metric_relabel_configs for dashboard compatibility with the shared-nodes collector.

    Metrics are exported to Datadog via the OTel Datadog exporter.

    Prerequisites:
    - Datadog account with API key
    - vCluster with dedicated/private nodes

    Deploy into each private-nodes vCluster.
  displayName: OTEL Collector - Private Nodes (Datadog)
  icon: https://opentelemetry.io/img/logos/opentelemetry-logo-nav.png
  parameters:
  - description: Your Datadog API key
    label: Datadog API Key
    required: true
    type: password
    variable: datadog.apiKey
  - defaultValue: datadoghq.com
    description: 'Datadog site (e.g. datadoghq.com, datadoghq.eu, us5.datadoghq.com)'
    label: Datadog Site
    variable: datadog.site
  - description: Skip TLS verification when scraping kubelet endpoints
    label: Skip Kubelet TLS Verification
    type: boolean
    variable: scrape.insecure
  recommendedApp:
  - virtualcluster
