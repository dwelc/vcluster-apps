apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: otel-collector-shared-nodes
spec:
  access:
  - users:
    - '*'
    verbs:
    - get
  config:
    chart:
      name: opentelemetry-kube-stack
      repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      version: 0.14.4
    values: | # yaml
      ---
      clusterName: "{{ .Values.loft.cluster }}"
      crds:
        installPrometheus: false
      opentelemetry-operator:
        enabled: true
        manager:
          collectorImage:
            repository: otel/opentelemetry-collector-contrib
          featureGatesMap:
            operator.targetallocator.mtls: true
        admissionWebhooks:
          certManager:
            enabled: false
          autoGenerateCert:
            enabled: true
            recreate: true
      # Post-install job removes DELETE validation webhooks that block app uninstallation (operator bug).
      # The operator incorrectly denies DELETE operations on collector CRs in deployment+TA mode,
      # which causes the chart's pre-delete cleanup job to fail and hang termination.
      extraObjects:
      - apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: patch-webhook-sa
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "1"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: otel-collector-shared-nodes-patch-webhook
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "1"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        rules:
        - apiGroups: ["admissionregistration.k8s.io"]
          resources: ["validatingwebhookconfigurations"]
          verbs: ["get", "patch"]
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: otel-collector-shared-nodes-patch-webhook
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "1"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        subjects:
        - kind: ServiceAccount
          name: patch-webhook-sa
          namespace: otel
        roleRef:
          kind: ClusterRole
          name: otel-collector-shared-nodes-patch-webhook
          apiGroup: rbac.authorization.k8s.io
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: patch-webhook
          annotations:
            "helm.sh/hook": post-install,post-upgrade
            "helm.sh/hook-weight": "10"
            "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
        spec:
          template:
            spec:
              restartPolicy: Never
              serviceAccountName: patch-webhook-sa
              containers:
              - name: patch
                image: "bitnami/kubectl:latest"
                command: ["bash", "-c"]
                args:
                - |
                  WH="otel-collector-shared-nodes-opentelemetry-operator-validation"
                  for i in $(seq 1 30); do kubectl get validatingwebhookconfiguration "$WH" >/dev/null 2>&1 && break; sleep 2; done
                  # Build JSON patch to remove webhooks with "delete" in name (reverse order to preserve indices)
                  PATCH=$(kubectl get validatingwebhookconfiguration "$WH" -o jsonpath='{range .webhooks[*]}{.name}{"\n"}{end}' \
                    | awk '/delete/{print NR-1}' | sort -rn \
                    | awk 'BEGIN{printf "["} NR>1{printf ","} {printf "{\"op\":\"remove\",\"path\":\"/webhooks/%d\"}",$1} END{printf "]"}')
                  [ "$PATCH" = "[]" ] && exit 0
                  echo "Removing DELETE webhooks: $PATCH"
                  kubectl patch validatingwebhookconfiguration "$WH" --type=json -p="$PATCH"
      collectors:
        # Disable the default DaemonSet collector
        daemon:
          enabled: false
        # Deployment-mode collector with Target Allocator
        cluster:
          enabled: true
          suffix: cluster
          mode: deployment
          replicas: 2
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          presets:
            kubernetesAttributes:
              enabled: true
          targetAllocator:
            enabled: true
            allocationStrategy: consistent-hashing
            prometheusCR:
              enabled: true
              serviceMonitorSelector:
                matchLabels:
                  app: vcluster
              podMonitorSelector: {}
          config:
            receivers:
              prometheus:
                config:
                  scrape_configs:
                    - job_name: 'kubelet-cadvisor'
                      scrape_interval: 60s
                      kubernetes_sd_configs:
                        - role: node
                      scheme: https
                      tls_config:
                        insecure_skip_verify: true
                      authorization:
                        credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
                      metrics_path: /metrics/cadvisor
                      relabel_configs:
                        - source_labels: [__meta_kubernetes_node_address_InternalIP]
                          target_label: __address__
                          replacement: '$$1:10250'
                        - action: labelmap
                          regex: __meta_kubernetes_node_label_(.+)
                        - source_labels: [__meta_kubernetes_node_name]
                          target_label: node
            processors:
              groupbyattrs:
                keys:
                - namespace
                - pod
                - node
              transform/pre_enrich:
                error_mode: ignore
                metric_statements:
                - context: resource
                  statements:
                  - 'set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil'
                  - 'set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil'
                  - 'set(attributes["k8s.node.name"], attributes["node"]) where attributes["node"] != nil'
              k8sattributes:
                auth_type: serviceAccount
                passthrough: false
                extract:
                  metadata:
                  - k8s.namespace.name
                  - k8s.pod.name
                  - k8s.pod.start_time
                  - k8s.pod.uid
                  - k8s.deployment.name
                  - k8s.node.name
                  - k8s.container.name
                  labels:
                  # Pod labels - vcluster syncer adds these to synced pods
                  - tag_name: vcluster.virtual.namespace
                    key: vcluster.loft.sh/namespace
                    from: pod
                  # Namespace labels - platform adds these to vcluster namespaces
                  - tag_name: vcluster.project
                    key: loft.sh/project
                    from: namespace
                  - tag_name: vcluster.project.namespace
                    key: loft.sh/vcluster-instance-namespace
                    from: namespace
                  - tag_name: vcluster.user
                    key: loft.sh/user
                    from: namespace
                  - tag_name: vcluster.name
                    key: loft.sh/vcluster-instance-name
                    from: namespace
                  annotations:
                  # Pod annotations - identifies the virtual pod name
                  - tag_name: vcluster.virtual.pod
                    key: vcluster.loft.sh/name
                    from: pod
              transform:
                error_mode: ignore
                metric_statements:
                - context: datapoint
                  statements:
                  - 'set(attributes["k8s.node.name"], resource.attributes["k8s.node.name"])'
                  - 'set(attributes["k8s.pod.name"], resource.attributes["k8s.pod.name"])'
                  - 'set(attributes["k8s.namespace.name"], resource.attributes["k8s.namespace.name"])'
                  - 'set(attributes["vcluster.virtual.pod"], resource.attributes["vcluster.virtual.pod"])'
                  - 'set(attributes["vcluster.virtual.namespace"], resource.attributes["vcluster.virtual.namespace"])'
                  - 'set(attributes["vcluster.project"], resource.attributes["vcluster.project"])'
                  - 'set(attributes["vcluster.project.namespace"], resource.attributes["vcluster.project.namespace"])'
                  - 'set(attributes["vcluster.user"], resource.attributes["vcluster.user"])'
                  - 'set(attributes["vcluster.name"], resource.attributes["vcluster.name"])'
              filter/vcluster_only:
                metrics:
                  datapoint:
                  - 'resource.attributes["vcluster.name"] == nil'
              resource/add_cluster:
                attributes:
                - action: upsert
                  key: cluster
                  value: "{{ .Values.loft.cluster }}"
              memory_limiter:
                check_interval: 1s
                limit_percentage: 75
                spike_limit_percentage: 15
              batch:
                send_batch_size: 10000
                send_batch_max_size: 10000
                timeout: 10s
            exporters:
              prometheusremotewrite:
                endpoint: '{{ .Values.prometheus.endpoint }}/api/v1/write'
      {{- if and .Values.prometheus.username .Values.prometheus.password }}
                auth:
                  authenticator: basicauth/prw
      {{- end }}
                tls:
                  insecure_skip_verify: {{ .Values.prometheus.insecure }}
                resource_to_telemetry_conversion:
                  enabled: true
            extensions:
              health_check:
                endpoint: 0.0.0.0:13133
      {{- if and .Values.prometheus.username .Values.prometheus.password }}
              basicauth/prw:
                client_auth:
                  username: "{{ .Values.prometheus.username }}"
                  password: "{{ .Values.prometheus.password }}"
      {{- end }}
            service:
              extensions:
              - health_check
      {{- if and .Values.prometheus.username .Values.prometheus.password }}
              - basicauth/prw
      {{- end }}
              pipelines:
                metrics:
                  receivers:
                  - prometheus
                  processors:
                  - memory_limiter
                  - groupbyattrs
                  - transform/pre_enrich
                  - k8sattributes
                  - filter/vcluster_only
                  - resource/add_cluster
                  - transform
                  - batch
                  exporters:
                  - prometheusremotewrite
  defaultNamespace: monitoring
  description: |
    OpenTelemetry Kube Stack for shared node vCluster monitoring on the host cluster.

    Deploys a Deployment-mode OTel Collector (2 replicas) with Target Allocator
    using consistent-hashing to distribute scrape targets across replicas.

    Workload metrics: Scrapes cAdvisor /metrics/cadvisor via the Prometheus receiver
    with kubernetes_sd_configs (node role). Uses standard Prometheus metric names
    (container_cpu_usage_seconds_total, etc.). Non-vcluster metrics are filtered out
    after enrichment via the filter/vcluster_only processor.

    Control plane metrics: Target Allocator discovers vcluster ServiceMonitors
    (filtered by app=vcluster label) and scrapes API server and controller-manager
    metrics with per-vcluster mTLS handled automatically.

    All metrics are enriched with vcluster identity labels at ingest time via
    groupbyattrs + k8sattributes processors. The cluster label is set automatically
    from {{ .Values.loft.cluster }}. No PromQL joins needed at query time.

    Prerequisites:
    - Prometheus with remote write receiver enabled
    - Kubelet scraping disabled in existing kube-prometheus-stack (kubelet.enabled: false)
    - vClusters must have controlPlane.serviceMonitor.enabled: true
    - Prometheus Operator CRDs must be installed (ServiceMonitor, PodMonitor)
    - Platform namespace labels (loft.sh/project, etc.) must exist

    Deploy once per host cluster.
  displayName: OTEL Collector - Shared Nodes
  icon: https://opentelemetry.io/img/logos/opentelemetry-logo-nav.png
  parameters:
  - description: The Prometheus remote write endpoint (without /api/v1/write suffix)
    label: Prometheus Endpoint
    required: true
    variable: prometheus.endpoint
  - description: Username for basic auth (optional)
    label: Prometheus Username
    variable: prometheus.username
  - description: Password for basic auth (optional)
    label: Prometheus Password
    type: password
    variable: prometheus.password
  - description: Skip TLS verification for the connection to Prometheus
    label: Prometheus Skip TLS Verification
    type: boolean
    variable: prometheus.insecure
  recommendedApp:
  - cluster
